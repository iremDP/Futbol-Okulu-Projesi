<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <title>Şubeler - Futbol Okulu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-links a {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
        }

        .nav-links a.admin-link {
            background: #dc3545;
        }

        .nav-links a:hover {
            background: #5568d3;
        }

        .content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .btn-primary {
            background: #667eea;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .sube-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .sube-card {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            border-left: 5px solid #667eea;
            cursor: pointer;
            transition: all 0.3s;
        }

        .sube-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .sube-card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 22px;
        }

        .sube-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }

        .stat-item {
            background: white;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
        }

        .sube-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-edit {
            background: #ffc107;
            color: #333;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .btn-toggle {
            background: #28a745;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
        }

        .success-message {
            background: #4caf50;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🏢 Şubeler Yönetimi</div>
            <div class="nav-links" id="navMenu"></div>
            <button class="btn-primary" onclick="logout()">Çıkış</button>
        </div>

        <div class="content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Şubeler</h2>
                <button class="btn-primary" onclick="openAddModal()">➕ Yeni Şube</button>
            </div>

            <div id="successMessage" class="success-message"></div>

            <div class="sube-grid" id="subeList"></div>
        </div>
    </div>

    <!-- Şube Ekle/Düzenle Modal -->
    <div id="subeModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Yeni Şube</h2>
            <form id="subeForm">
                <input type="hidden" id="subeId">
                
                <div class="form-group">
                    <label>Şube Adı *</label>
                    <input type="text" id="subeAdi" required>
                </div>

                <div class="form-group">
                    <label>Adres</label>
                    <input type="text" id="adres">
                </div>

                <div class="form-group">
                    <label>Telefon</label>
                    <input type="tel" id="telefon">
                </div>

                <button type="submit" class="btn-primary">💾 Kaydet</button>
                <button type="button" class="btn-edit" onclick="closeModal()">İptal</button>
            </form>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="menu.js"></script>
    <script>
        const API_URL = (window.API_URL || window.location.origin + '/api');

        // Yetki kontrolü
        (function() {
            const user = localStorage.getItem('currentUser');
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            
            const userData = JSON.parse(user);
            if (userData.rol !== 'admin') {
                alert('Bu sayfaya erişim yetkiniz yok!');
                window.location.href = 'index.html';
            }
        })();

        // Menü ortak dosyadan yüklenir

        loadSubeler();

        async function loadSubeler() {
            try {
                const response = await fetch(`${API_URL}/subeler`);
                const subeler = await response.json();

                const list = document.getElementById('subeList');
                list.innerHTML = '';

                for (const sube of subeler) {
                    const statsResponse = await fetch(`${API_URL}/subeler/${sube.id}/stats`);
                    const stats = await statsResponse.json();

                    list.innerHTML += `
                        <div class="sube-card" onclick="window.location.href='dashboard.html?subeId=${sube.id}'">
                            <h3>${esc(sube.subeAdi)}</h3>
                            <div class="sube-stats">
                                <div class="stat-item">
                                    <div class="stat-number">${stats.activeStudents}</div>
                                    <div class="stat-label">Aktif Öğrenci</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-number">${stats.groups}</div>
                                    <div class="stat-label">Grup</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-number">${stats.instructors}</div>
                                    <div class="stat-label">Antrenör</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-number">${stats.totalStudents}</div>
                                    <div class="stat-label">Toplam Öğrenci</div>
                                </div>
                            </div>
                            <div class="sube-actions" onclick="event.stopPropagation()">
                                <button class="btn-edit" onclick="editSube(${sube.id})">✏️ Düzenle</button>
                               <button class="btn-toggle" onclick="toggleSube(${sube.id})">${sube.aktif ? '⏸️ Pasif Yap' : '▶️ Aktif Yap'}</button>
            ${!sube.aktif ? `<button class="btn-edit" style="background: #dc3545; color: white;" onclick="deleteSube(${sube.id})">🗑️ Sil</button>` : ''}
                            </div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Şubeler yüklenemedi:', error);
            }
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'Yeni Şube';
            document.getElementById('subeForm').reset();
            document.getElementById('subeId').value = '';
            document.getElementById('subeModal').classList.add('active');
        }

        async function editSube(id) {
            const response = await fetch(`${API_URL}/subeler/${id}`);
            const sube = await response.json();

            document.getElementById('modalTitle').textContent = 'Şube Düzenle';
            document.getElementById('subeId').value = sube.id;
            document.getElementById('subeAdi').value = sube.subeAdi;
            document.getElementById('adres').value = sube.adres || '';
            document.getElementById('telefon').value = sube.telefon || '';
            document.getElementById('subeModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('subeModal').classList.remove('active');
        }

        document.getElementById('subeForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = document.getElementById('subeId').value;
            const sube = {
                subeAdi: document.getElementById('subeAdi').value,
                adres: document.getElementById('adres').value,
                telefon: document.getElementById('telefon').value
            };

            try {
                const url = id ? `${API_URL}/subeler/${id}` : `${API_URL}/subeler`;
                const method = id ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(sube)
                });

                if (response.ok) {
                    showMessage('✅ Şube kaydedildi!');
                    closeModal();
                    loadSubeler();
                }
            } catch (error) {
                showMessage('❌ Hata: ' + error.message);
            }
        });

        async function toggleSube(id) {
            if (!confirm('Şube durumunu değiştirmek istediğinizden emin misiniz?')) return;

            try {
                await fetch(`${API_URL}/subeler/${id}/toggle`, { method: 'PUT' });
                showMessage('✅ Şube durumu güncellendi!');
                loadSubeler();
            } catch (error) {
                showMessage('❌ Hata: ' + error.message);
            }
        }

        async function deleteSube(id) {
            if (!confirm('Bu şubeyi silmek istediğinizden emin misiniz? Bu işlem geri alınamaz!')) return;

            try {
                const response = await fetch(`${API_URL}/subeler/${id}`, { method: 'DELETE' });
                
                if (response.ok) {
                    showMessage('✅ Şube silindi!');
                    loadSubeler();
                } else {
                    const error = await response.json();
                    showMessage('❌ ' + error.error);
                }
            } catch (error) {
                showMessage('❌ Hata: ' + error.message);
            }
        }

       

        function showMessage(msg) {
            const el = document.getElementById('successMessage');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

    </script>
</body>
</html>
