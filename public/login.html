<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş - Futbol Okulu Yönetim Sistemi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            font-size: 32px;
            color: #667eea;
            margin-bottom: 10px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .error-message {
            background: #dc3545;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .info-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
            text-align: center;
        }

        .info-box h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .role-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin: 5px;
        }

        .role-admin {
            background: #dc3545;
            color: white;
        }

        .role-manager {
            background: #667eea;
            color: white;
        }

        .role-trainer {
            background: #28a745;
            color: white;
        }

        .role-parent {
            background: #ffc107;
            color: #333;
        }
    </style>
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>⚽ Futbol Okulu</h1>
            <p>Yönetim Sistemi</p>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Kullanıcı Adı</label>
                <input type="text" id="username" required autofocus>
            </div>
            <div class="form-group">
                <label>Şifre</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn-login">Giriş Yap</button>
        </form>

        <div class="info-box">
            <h3>Kullanıcı Rolleri</h3>
            <span class="role-badge role-admin">👑 Admin</span>
            <span class="role-badge role-manager">🏢 Yönetici</span>
            <span class="role-badge role-trainer">🏃 Antrenör</span>
            <span class="role-badge role-parent">👨‍👩‍👧 Veli</span>
            <p style="margin-top: 15px; font-size: 12px; color: #666;">
                İlk girişte admin şifresini mutlaka değiştirin.
            </p>
        </div>
    </div>

    <script>
        const API_URL = (window.location.origin || 'http://localhost:3000') + '/api';

        // Sayfa yüklendiğinde
        checkIfLoggedIn();

        function checkIfLoggedIn() {
            const user = localStorage.getItem('currentUser');
            const token = localStorage.getItem('token');
            if (user && token) {
                redirectToHome(JSON.parse(user));
            }
        }

        // Giriş formu
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ kullaniciAdi: username, sifre: password })
                });

                let data;
                try {
                    data = await response.json();
                } catch {
                    showError('Sunucu yanıtı okunamadı. Sunucu çalışıyor mu?');
                    return;
                }
                if (response.ok) {
                    const user = data.user;
                    if (!user || !data.token) {
                        showError('Giriş yanıtı eksik.');
                        return;
                    }
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    if (data.mustChangePassword) {
                        localStorage.setItem('mustChangePassword', '1');
                        if (user.rol === 'admin') {
                            window.location.href = 'kullanicilar.html?changePassword=1';
                            return;
                        }
                    } else {
                        localStorage.removeItem('mustChangePassword');
                    }
                    redirectToHome(user);
                } else {
                    showError(data.error || 'Giriş başarısız');
                }
            } catch (error) {
                showError('Sunucuya bağlanılamadı. Sunucu çalışıyor mu? (npm start)');
            }
        });

        // Kullanıcıyı role göre yönlendir
       function redirectToHome(user) {
            switch(user.rol) {
                case 'admin':
                case 'yonetici':
                    window.location.href = 'dashboard.html';
                    break;
                case 'antrenor':
                    window.location.href = 'gruplar.html';
                    break;
                case 'veli':
                    window.location.href = 'veli.html';
                    break;
                default:
                    window.location.href = 'dashboard.html';
            }
        }

        // Hata göster
        function showError(msg) {
            const el = document.getElementById('errorMessage');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => {
                el.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
